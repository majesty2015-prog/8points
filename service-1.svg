<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#08080F"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg1)"/>
  <!-- Glow circle -->
  <circle cx="160" cy="220" r="260" fill="url(#glow1)"/>

  <!-- Icon background -->
  <rect x="80" y="120" width="100" height="100" rx="24" fill="#4F46E5" opacity="0.15"/>
  <rect x="80" y="120" width="100" height="100" rx="24" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.4"/>

  <!-- Icon: magnifying glass with chart -->
  <circle cx="122" cy="162" r="22" fill="none" stroke="#4F46E5" stroke-width="3"/>
  <line x1="138" y1="178" x2="158" y2="198" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="168" x2="110" y2="158" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="118" y1="168" x2="118" y2="152" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="126" y1="168" x2="126" y2="160" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="134" y1="168" x2="134" y2="155" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Label -->
  <text x="80" y="275" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#4F46E5" letter-spacing="3">АУДИТ БИЗНЕСА</text>

  <!-- Title -->
  <text x="80" y="330" font-family="Georgia, serif" font-weight="700" font-size="42" fill="#ffffff">Аудит бизнеса</text>
  <text x="80" y="382" font-family="Georgia, serif" font-weight="700" font-size="42" fill="#ffffff">на эффективность</text>

  <!-- Divider -->
  <line x1="80" y1="415" x2="200" y2="415" stroke="#4F46E5" stroke-width="2"/>

  <!-- Description -->
  <text x="80" y="452" font-family="Inter, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.5)">Находим слепые зоны, утечки ресурсов</text>
  <text x="80" y="476" font-family="Inter, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.5)">и точки роста вашего бизнеса</text>

  <!-- Brand -->
  <text x="80" y="550" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.9)" letter-spacing="2">8 <tspan fill="#4F46E5">ПОИНТС</tspan></text>

  <!-- Decorative dots -->
  <circle cx="680" cy="100" r="3" fill="#4F46E5" opacity="0.5"/>
  <circle cx="700" cy="120" r="2" fill="#4F46E5" opacity="0.3"/>
  <circle cx="720" cy="95" r="4" fill="#4F46E5" opacity="0.2"/>
  <circle cx="660" cy="130" r="2" fill="#4F46E5" opacity="0.4"/>
  <circle cx="740" cy="140" r="3" fill="#4F46E5" opacity="0.3"/>

  <!-- Decorative grid -->
  <rect x="580" y="200" width="180" height="180" rx="16" fill="none" stroke="rgba(79,70,229,0.12)" stroke-width="1"/>
  <rect x="600" y="220" width="140" height="140" rx="12" fill="none" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
  <line x1="580" y1="260" x2="760" y2="260" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
  <line x1="580" y1="300" x2="760" y2="300" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
  <line x1="580" y1="340" x2="760" y2="340" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
  <line x1="620" y1="200" x2="620" y2="380" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
  <line x1="660" y1="200" x2="660" y2="380" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
  <line x1="700" y1="200" x2="700" y2="380" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
  <line x1="740" y1="200" x2="740" y2="380" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
</svg>
