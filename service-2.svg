<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#08080F"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg2)"/>
  <circle cx="160" cy="220" r="260" fill="url(#glow2)"/>

  <!-- Icon background -->
  <rect x="80" y="120" width="100" height="100" rx="24" fill="#4F46E5" opacity="0.15"/>
  <rect x="80" y="120" width="100" height="100" rx="24" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.4"/>

  <!-- Icon: pulse/diagnostic -->
  <rect x="92" y="152" width="76" height="36" rx="6" fill="none" stroke="#4F46E5" stroke-width="2" opacity="0.5"/>
  <polyline points="98,170 108,170 116,148 126,192 136,158 144,170 168,170" fill="none" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Label -->
  <text x="80" y="275" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#4F46E5" letter-spacing="3">ДИАГНОСТИКА</text>

  <!-- Title -->
  <text x="80" y="330" font-family="Georgia, serif" font-weight="700" font-size="42" fill="#ffffff">Диагностика</text>
  <text x="80" y="382" font-family="Georgia, serif" font-weight="700" font-size="42" fill="#ffffff">МСБ и МБ</text>

  <!-- Divider -->
  <line x1="80" y1="415" x2="200" y2="415" stroke="#4F46E5" stroke-width="2"/>

  <!-- Description -->
  <text x="80" y="452" font-family="Inter, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.5)">Системный анализ малого и среднего</text>
  <text x="80" y="476" font-family="Inter, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.5)">бизнеса — вектор роста за 30 дней</text>

  <!-- Brand -->
  <text x="80" y="550" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.9)" letter-spacing="2">8 <tspan fill="#4F46E5">ПОИНТС</tspan></text>

  <!-- Decorative elements -->
  <circle cx="680" cy="100" r="3" fill="#4F46E5" opacity="0.5"/>
  <circle cx="700" cy="120" r="2" fill="#4F46E5" opacity="0.3"/>
  <circle cx="720" cy="95" r="4" fill="#4F46E5" opacity="0.2"/>
  <circle cx="660" cy="130" r="2" fill="#4F46E5" opacity="0.4"/>
  <circle cx="740" cy="140" r="3" fill="#4F46E5" opacity="0.3"/>

  <!-- Decorative rings -->
  <circle cx="670" cy="310" r="90" fill="none" stroke="rgba(79,70,229,0.1)" stroke-width="1"/>
  <circle cx="670" cy="310" r="65" fill="none" stroke="rgba(79,70,229,0.08)" stroke-width="1"/>
  <circle cx="670" cy="310" r="40" fill="none" stroke="rgba(79,70,229,0.12)" stroke-width="1"/>
  <circle cx="670" cy="310" r="15" fill="rgba(79,70,229,0.15)"/>
  <line x1="580" y1="310" x2="760" y2="310" stroke="rgba(79,70,229,0.06)" stroke-width="1"/>
  <line x1="670" y1="220" x2="670" y2="400" stroke="rgba(79,70,229,0.06)" stroke-width="1"/>
</svg>
