<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#08080F"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.32"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg1)"/>
  <circle cx="160" cy="210" r="270" fill="url(#glow1)"/>

  <!-- Icon background -->
  <rect x="80" y="120" width="100" height="100" rx="24" fill="#4F46E5" opacity="0.15"/>
  <rect x="80" y="120" width="100" height="100" rx="24" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.4"/>

  <!-- Icon: monitor screen -->
  <rect x="92" y="136" width="76" height="52" rx="7" fill="none" stroke="#4F46E5" stroke-width="2" opacity="0.55"/>
  <rect x="92" y="136" width="76" height="52" rx="7" fill="#4F46E5" opacity="0.08"/>
  <!-- EKG line -->
  <polyline points="96,163 108,163 116,148 124,178 131,155 139,163 152,163 160,163"
            fill="none" stroke="#818CF8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Monitor stand -->
  <line x1="130" y1="188" x2="130" y2="200" stroke="#4F46E5" stroke-width="2" opacity="0.5"/>
  <line x1="116" y1="200" x2="144" y2="200" stroke="#4F46E5" stroke-width="2" opacity="0.5"/>

  <!-- Label -->
  <text x="80" y="265" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#4F46E5" letter-spacing="3">ДИАГНОСТИКА БИЗНЕСА</text>

  <!-- Title -->
  <text x="80" y="315" font-family="Georgia, serif" font-weight="700" font-size="37" fill="#ffffff">Диагностика</text>
  <text x="80" y="357" font-family="Georgia, serif" font-weight="700" font-size="37" fill="#ffffff">«операционки»</text>
  <text x="80" y="399" font-family="Georgia, serif" font-weight="700" font-size="37" fill="#4F46E5">бизнеса</text>

  <!-- Divider -->
  <line x1="80" y1="422" x2="210" y2="422" stroke="#4F46E5" stroke-width="2"/>

  <!-- Description -->
  <text x="80" y="450" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.5)">Анализируем операционную часть бизнеса</text>
  <text x="80" y="472" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.5)">и выявляем, что мешает получать</text>
  <text x="80" y="494" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.5)">желаемую прибыль.</text>

  <!-- Brand -->
  <text x="80" y="558" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.9)" letter-spacing="2">8 <tspan fill="#4F46E5">ПОИНТС</tspan></text>

  <!-- Decorative dots -->
  <circle cx="680" cy="100" r="3" fill="#4F46E5" opacity="0.5"/>
  <circle cx="700" cy="120" r="2" fill="#4F46E5" opacity="0.3"/>
  <circle cx="720" cy="95" r="4" fill="#4F46E5" opacity="0.2"/>
  <circle cx="660" cy="130" r="2" fill="#4F46E5" opacity="0.4"/>
  <circle cx="740" cy="140" r="3" fill="#4F46E5" opacity="0.3"/>

  <!-- Decorative rings -->
  <circle cx="670" cy="350" r="115" fill="none" stroke="rgba(79,70,229,0.07)" stroke-width="1"/>
  <circle cx="670" cy="350" r="85" fill="none" stroke="rgba(79,70,229,0.09)" stroke-width="1"/>
  <circle cx="670" cy="350" r="55" fill="none" stroke="rgba(79,70,229,0.12)" stroke-width="1"/>
  <circle cx="670" cy="350" r="25" fill="rgba(79,70,229,0.14)"/>
  <circle cx="670" cy="350" r="6" fill="#4F46E5" opacity="0.55"/>
</svg>
