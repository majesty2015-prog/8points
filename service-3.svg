<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#08080F"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg3)"/>
  <circle cx="160" cy="220" r="260" fill="url(#glow3)"/>

  <!-- Icon background -->
  <rect x="80" y="120" width="100" height="100" rx="24" fill="#4F46E5" opacity="0.15"/>
  <rect x="80" y="120" width="100" height="100" rx="24" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.4"/>

  <!-- Icon: process flow -->
  <rect x="91" y="148" width="26" height="22" rx="5" fill="#4F46E5" opacity="0.7"/>
  <rect x="143" y="148" width="26" height="22" rx="5" fill="#4F46E5" opacity="0.7"/>
  <rect x="117" y="178" width="26" height="22" rx="5" fill="#818CF8" opacity="0.9"/>
  <line x1="117" y1="159" x2="143" y2="159" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
  <line x1="130" y1="170" x2="130" y2="178" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>

  <!-- Label -->
  <text x="80" y="275" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="13" fill="#4F46E5" letter-spacing="3">АУДИТ ПРОЦЕССОВ</text>

  <!-- Title -->
  <text x="80" y="330" font-family="Georgia, serif" font-weight="700" font-size="40" fill="#ffffff">Аудит эффективности</text>
  <text x="80" y="380" font-family="Georgia, serif" font-weight="700" font-size="40" fill="#ffffff">бизнес-процессов</text>

  <!-- Divider -->
  <line x1="80" y1="415" x2="200" y2="415" stroke="#4F46E5" stroke-width="2"/>

  <!-- Description -->
  <text x="80" y="452" font-family="Inter, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.5)">Выявляем где процессы тормозят рост</text>
  <text x="80" y="476" font-family="Inter, Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.5)">и указываем конкретный вектор действий</text>

  <!-- Brand -->
  <text x="80" y="550" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.9)" letter-spacing="2">8 <tspan fill="#4F46E5">ПОИНТС</tspan></text>

  <!-- Decorative dots -->
  <circle cx="680" cy="100" r="3" fill="#4F46E5" opacity="0.5"/>
  <circle cx="700" cy="120" r="2" fill="#4F46E5" opacity="0.3"/>
  <circle cx="720" cy="95" r="4" fill="#4F46E5" opacity="0.2"/>
  <circle cx="660" cy="130" r="2" fill="#4F46E5" opacity="0.4"/>
  <circle cx="740" cy="140" r="3" fill="#4F46E5" opacity="0.3"/>

  <!-- Decorative flow diagram -->
  <rect x="580" y="220" width="60" height="36" rx="8" fill="none" stroke="rgba(79,70,229,0.2)" stroke-width="1.5"/>
  <rect x="580" y="300" width="60" height="36" rx="8" fill="none" stroke="rgba(79,70,229,0.2)" stroke-width="1.5"/>
  <rect x="580" y="380" width="60" height="36" rx="8" fill="none" stroke="rgba(79,70,229,0.2)" stroke-width="1.5"/>
  <line x1="610" y1="256" x2="610" y2="300" stroke="rgba(79,70,229,0.2)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="610" y1="336" x2="610" y2="380" stroke="rgba(79,70,229,0.2)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="680" y="258" width="60" height="36" rx="8" fill="none" stroke="rgba(79,70,229,0.15)" stroke-width="1.5"/>
  <rect x="680" y="338" width="60" height="36" rx="8" fill="none" stroke="rgba(79,70,229,0.15)" stroke-width="1.5"/>
  <line x1="640" y1="238" x2="680" y2="276" stroke="rgba(79,70,229,0.15)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="640" y1="318" x2="680" y2="356" stroke="rgba(79,70,229,0.15)" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
